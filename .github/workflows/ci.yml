name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      CHROME_BIN: /usr/bin/google-chrome-stable

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          install: true

      - name: Install Python dependencies
        run: poetry install --no-interaction

      - name: Install UI dependencies
        run: cd ui && yarn install --non-interactive

      - name: Run linting
        run: make lint

      - name: Build dev Docker image
        run: make build-dev

      - name: Run tests
        run: make test

      - name: Build Docker image (local)
        run: docker buildx build --load -t brewhouse-manager:ci .

      - name: Snyk container test
        run: |
          snyk container test brewhouse-manager:ci \
            --exclude-base-image-vulns \
            --severity-threshold=high \
            --project-name=brewhouse-manager:main \
            --file=./Dockerfile \
            --platform=$(docker inspect brewhouse-manager:ci --format='{{.Os}}/{{.Architecture}}')